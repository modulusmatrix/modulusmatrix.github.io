<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | İleri Düzey Analiz</title>
    <style>
        body { font-family: 'Times New Roman', serif; max-width: 600px; margin: 40px auto; padding: 30px; background: #fdfbf7; }
        .analiz-sonuc { background: #fff; border: 1px solid #dcdcdc; padding: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>MODULUS X</h1>
    <p><i>"İnsan sadece yer değiştirme ve birleşme yapar; değeri Allah yaratır."</i></p>
    
    <textarea id="durum" style="width:100%; height:120px;" placeholder="Durumunu yaz..."></textarea>
    <button onclick="analizEt()" style="width:100%; padding:15px; background:#231c14; color:#fff;">GELİŞMİŞ ANALİZİ BAŞLAT</button>
    <div id="sonuc" class="analiz-sonuc" style="margin-top:20px;"></div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        
        // Daha gelişmiş, talimat takip kapasitesi yüksek bir model (LaMini)
        const generator = await pipeline('text2text-generation', 'Xenova/LaMini-Flan-T5-783M');

        window.analizEt = async () => {
            const d = document.getElementById('durum').value;
            const sonucDiv = document.getElementById('sonuc');
            sonucDiv.innerText = "Teorik hesaplamalar yapılıyor, lütfen bekleyin...";

            const talimat = `Teori: Zaman * (YerDeğiştirme * Birleşme) = Değer.
            Durum: ${d}.
            Lütfen şu formatta analiz et:
            1. Formülün Durumu: (Zaman, Yer Değiştirme ve Birleşme analizi)
            2. Tashih (İyileştirme): (Negatifse nasıl pozitif değere dönüşür?)
            3. Fiili Görev: (Bugün atılması gereken somut 1 adım)`;
            
            try {
                // max_new_tokens değerini artırarak cevabın yarım kalmamasını sağlıyoruz
                const sonuc = await generator(talimat, { max_new_tokens: 300, temperature: 0.7 });
                sonucDiv.innerText = sonuc[0].generated_text;
            } catch (e) {
                sonucDiv.innerText = "Sistem kapasitesi doldu, lütfen sayfayı yenileyip tekrar deneyin.";
            }
        };
    </script>
</body>
</html>
