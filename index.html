<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Teorik Analiz</title>
    <style>
        body { font-family: 'Times New Roman', serif; background: #faf8f5; max-width: 600px; margin: 40px auto; padding: 20px; color: #2d2d2d; }
        h1 { border-bottom: 2px solid #8b4513; padding-bottom: 10px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #8b4513; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #231c14; color: #fff; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
        #sonuc { margin-top: 20px; padding: 20px; border-left: 4px solid #8b4513; background: #fff; line-height: 1.8; white-space: pre-wrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>MODULUS X</h1>
    <p><i>"İnsan yer değiştirme ve birleşme yapar; Değeri Allah yaratır."</i></p>
    
    <textarea id="durum" placeholder="Durumunu, sıkıntını veya hedefini detaylıca buraya yaz..."></textarea>
    <button onclick="analizEt()">HAKİKAT IŞIĞINDA ANALİZ ET</button>
    <div id="sonuc">Analiz bekliyor...</div>

    <script>
        async function analizEt() {
            const d = document.getElementById('durum').value;
            const sonucDiv = document.getElementById('sonuc');
            const apiKey = "AQ.Ab8RN6Ifi4-x-8FbSJ1zj5r2m0T8q99OXZfGrG9WElnRAGGaEQ";

            if(!d) { sonucDiv.innerText = "Lütfen önce durumunu yaz."; return; }
            sonucDiv.innerText = "Teorik süzgeçten geçiliyor, lütfen bekleyin...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sen MODULUS X teorisinin dijital yansımasısın. Teori: Zaman * (Yer Değiştirme * Birleşme) = Değer. Referansın: Kur'an ve Sünnet. Durum: ${d}. Lütfen 3 başlıkta yanıtla: 1. Formülün Durumu (Analiz), 2. Tashih (Düzeltme), 3. Bugünün Fiili Görevi (Somut, uygulanabilir tek bir adım).` }] }]
                    })
                });
                
                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    sonucDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    sonucDiv.innerText = "Hata: " + JSON.stringify(data);
                }
            } catch (e) {
                sonucDiv.innerText = "Bağlantı hatası: " + e.message;
            }
        }
    </script>
</body>
</html>
