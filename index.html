<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULUS X | Yer Değiştirme ve Birleşme Teorisi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #161b26; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d1dcf0;
            padding: 20px;
        }
        
        .matrix-core {
            background: #1f2736;
            border: 1px solid #2b354a;
            border-radius: 16px;
            width: 100%;
            max-width: 620px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(10, 15, 26, 0.4);
        }

        /* Beyaza Yakın Sarı, Roman Stili Hakikat Paneli */
        .theory-essence-box {
            background-color: #fffef0; /* Beyaza yakın mat sarı / fildişi tonu */
            border: 1px solid #eadeb8;
            border-radius: 12px;
            padding: 26px 20px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.02);
        }

        .essence-text {
            font-family: 'Times New Roman', Times, Georgia, serif; /* Klasik Roman Stili */
            font-size: 1.4rem;
            font-weight: 700;
            color: #231c14; /* Derin edebi mat siyah/kahve tonu */
            line-height: 1.5;
            margin-bottom: 14px;
            font-style: italic;
        }

        .essence-footer {
            font-family: 'Times New Roman', Times, Georgia, serif;
            font-size: 0.95rem;
            color: #5c4f3e;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid #ebdca5;
            padding-top: 10px;
            display: inline-block;
            width: 85%;
        }
        
        .system-header { text-align: center; margin-bottom: 20px; }
        .system-title { font-size: 1.6rem; font-weight: 800; color: #4fc3f7; letter-spacing: 3px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85rem; color: #8fa3bf; margin-bottom: 6px; font-weight: 600; }
        
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        .eq-param {
            width: 100%;
            background: #1a212e;
            border: 1px solid #34445c;
            border-radius: 8px;
            padding: 10px 12px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }
        .eq-param:focus { border-color: #4fc3f7; background: #20293a; }
        
        .btn-matrix {
            width: 100%; 
            background: linear-gradient(135deg, #0288d1 0%, #01579b 100%); 
            border: none; border-radius: 8px;
            padding: 16px; color: #ffffff; font-weight: 700; font-size: 1rem;
            cursor: pointer; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.2s ease; margin-top: 10px;
        }
        .btn-matrix:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(2, 136, 209, 0.4); }
        .btn-matrix:disabled { background: #2c374e; color: #526480; cursor: not-allowed; }

        .action-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .action-table th { color: #4fc3f7; font-size: 0.8rem; text-align: left; padding: 10px; border-bottom: 2px solid #222c3d; text-transform: uppercase; }
        .action-table td { padding: 12px 10px; font-size: 0.85rem; border-bottom: 1px solid #1a212e; color: #e2e8f0; line-height: 1.6; }
    </style>
</head>
