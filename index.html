<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Final</title>
    <style>
        body { font-family: sans-serif; background: #faf8f5; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 120px; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #231c14; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        #sonuc { margin-top: 20px; padding: 15px; border: 1px solid #8b4513; background: #fff; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>MODULUS X</h1>
    <textarea id="durum" placeholder="İngilizce öğrenmek istiyorum..."></textarea>
    <button onclick="calistir()">ANALİZİ BAŞLAT</button>
    <div id="sonuc">Sistem hazır. Durumunu gir ve başlat.</div>

    <script>
        async function calistir() {
            const d = document.getElementById('durum').value;
            const sonucDiv = document.getElementById('sonuc');
            const apiKey = "AQ.Ab8RN6LPofuan4byolidiuvHe94M8v5Amw-b_TLmO1dMBFxckA";

            sonucDiv.innerText = "Teorik hesaplama yapılıyor...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `MODULUS X Teorisi (Zaman * (Yer Değiştirme * Birleşme) = Değer) perspektifiyle analiz et. Durum: ${d}. Lütfen 3 maddede yaz: 1. Analiz, 2. Tashih, 3. Bugünün Fiili Görevi.` }] }]
                    })
                });
                
                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    sonucDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    sonucDiv.innerText = "Sistem Hatası: " + JSON.stringify(data);
                }
            } catch (e) {
                sonucDiv.innerText = "Bağlantı Hatası: " + e.message;
            }
        }
    </script>
</body>
</html>
