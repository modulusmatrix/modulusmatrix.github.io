<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULUS X | AI Decision Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c111a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }

        .matrix-container {
            background: #121824;
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .matrix-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #00f2fe;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .matrix-subtitle {
            font-size: 0.85rem;
            color: #52667a;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a3b8cc;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: #172030;
            border: 1px solid #222f47;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: #00f2fe;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 115px);
            gap: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 12px;
        }

        .btn-calistir {
            width: 100%;
            background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%);
            border: none;
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: all 0.3s;
        }

        .btn-calistir:hover {
            opacity: 0.9;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.6);
        }

        .matrix-card {
            background: #172030;
            border: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 8px;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="matrix-container">
        <div class="matrix-title">Modulus X</div>
        <div class="matrix-subtitle">AI Decision Matrix</div>

        <div class="form-group">
            <label for="alanSecimi">Alan Seçimi (X Değişkeni)</label>
            <select id="alanSecimi" class="form-control">
                <option value="akademi">Zihinsel ve İlmi Akademi</option>
                <option value="strateji">Stratejik Planlama</option>
                <option value="teknoloji">Teknolojik Entegrasyon</option>
            </select>
        </div>

        <div class="form-group grid-3">
            <div>
                <label style="font-size:0.75rem;">Maddi Boyut (0-10)</label>
                <input type="number" id="maddiBoyut" class="form-control" min="0" max="10" value="5">
            </div>
            <div>
                <label style="font-size:0.75rem;">Manevi Boyut (0-10)</label>
                <input type="number" id="maneviBoyut" class="form-control" min="0" max="10" value="9">
            </div>
            <div>
                <label style="font-size:0.75rem;">Dış Boyut (0-10)</label>
                <input type="number" id="disBoyut" class="form-control" min="0" max="10" value="7">
            </div>
        </div>

        <div class="form-group grid-2">
            <div>
                <label style="font-size:0.75rem;">Zaman S (Bireysel Seviye)</label>
                <input type="number" id="zamanS" class="form-control" value="2030">
            </div>
            <div>
                <label style="font-size:0.75rem;">Zaman Z (Dünya Ortalaması)</label>
                <input type="number" id="zamanZ" class="form-control" value="2023">
            </div>
        </div>

        <button class="btn-calistir">MATRİSİ ÇALIŞTIR</button>
    </div>

    <script src="matrix-engine.js"></script>
</body>
</html>
