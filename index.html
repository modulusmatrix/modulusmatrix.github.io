<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULUS X | Yer Değiştirme ve Birleşme Teorisi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Sayfa bütünüyle beyaza yakın, mat bir sarı (fildişi/krem) tonuna kavuştu */
        body {
            background-color: #faf8f0; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #231c14;
            padding: 20px;
        }
        
        .matrix-core {
            background: #ffffff;
            border: 1px solid #e3dec3;
            border-radius: 12px;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(35, 28, 20, 0.05);
        }

        /* Üst Hakikat Künyesi */
        .theory-essence-box {
            background-color: #fffdf3; 
            border: 1px solid #ebdca5;
            border-radius: 8px;
            padding: 15px 12px;
            margin-bottom: 20px; 
            text-align: center;
        }

        .essence-text {
            font-family: 'Times New Roman', Times, Georgia, serif; 
            font-size: 1.25rem;
            font-weight: 700;
            color: #231c14; 
            line-height: 1.4;
            margin-bottom: 5px;
            font-style: italic;
        }

        .essence-footer {
            font-family: 'Times New Roman', Times, Georgia, serif;
            font-size: 0.7rem; 
            color: #7d6c55;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-top: 1px solid #ebdca5;
            padding-top: 4px;
            display: inline-block;
            width: 95%;
        }
        
        .system-header { text-align: center; margin-bottom: 20px; }
        .system-title { font-size: 1.5rem; font-weight: 800; color: #231c14; letter-spacing: 4px; display: block; border-bottom: 1px solid #e3dec3; padding-bottom: 8px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.9rem; color: #5c4f3e; margin-bottom: 8px; font-weight: 600; }
        
        /* Kişinin Durumunu Yazacağı Büyük Boş Kutu */
        .action-textarea {
            width: 100%;
            height: 150px;
            background: #ffffff;
            border: 1px solid #c4bfa3;
            border-radius: 8px;
            padding: 14px;
            color: #231c14;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.5;
            outline: none;
            resize: none;
            transition: all 0.2s ease;
        }
        .action-textarea:focus { border-color: #7d6c55; box-shadow: 0 0 5px rgba(125, 108, 85, 0.2); }
        .action-textarea::placeholder { color: #9c937c; font-style: italic; }
        
        .btn-matrix {
            width: 100%; 
            background: #231c14; 
            border: none; 
            border-radius: 6px;
            padding: 16px; 
            color: #ffffff; 
            font-weight: 700; 
            font-size: 0.95rem;
            cursor: pointer; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
            transition: all 0.2s ease; 
            display: block;
        }
        .btn-matrix:hover { background: #3d3225; }
        .btn-matrix:disabled { background: #e3dec3; color: #9c937c; cursor: not-allowed; }

        .action-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .action-table th { color: #5c4f3e; font-size: 0.8rem; text-align: left; padding: 10px; border-bottom: 2px solid #231c14; text-transform: uppercase; letter-spacing: 0.5px; }
        .action-table td { padding: 12px 10px; font-size: 0.85rem; border-bottom: 1px solid #e3dec3; color: #231c14; line-height: 1.6; }
        
        .source-tag { background: #f2edd5; color: #5c4f3e; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; display: inline-block; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="matrix-core">
        
        <div class="theory-essence-box">
            <div class="essence-text">
                "İnsan sadece yer değiştirme ve birleşme yapar, değeri yaratan Allah'tır."
            </div>
            <div class="essence-footer">
                Bayram Gedikli — Yer Değiştirme ve Birleşme Kitabı (Sayfa 18)
            </div>
        </div>

        <div class="system-header">
            <span class="system-title">MODULUS X</span>
        </div>

        <div class="input-group">
            <label for="kulIradeMetni">Mevcut Durumunuz, Niyetiniz ve Yapmak İstediğiniz Fiili Eylem</label>
            <textarea id="kulIradeMetni" class="action-textarea" placeholder="Durumunuzu ve hedefinizi buraya yazın... Örn: İlim yaymak adına bir kitap yazmak istiyorum ancak vakit bulamıyorum ve çevrem eylemlerimi kısıtlıyor..."></textarea>
        </div>

        <button class="btn-matrix" id="sentezButonu">TEORİK SENTEZİ BAŞLAT</button>
        
        <div id="matrix-result-panel"></div>
    </div>

    <script>
        document.getElementById('sentezButonu').addEventListener('click', function() {
            const metin = document.getElementById('kulIradeMetni').value.trim();

            if (metin.length < 10) {
                alert("Teorik Hata: Algoritmanın durumunuzu tüm boyutlarıyla analiz edebilmesi için lütfen mevcut durumunuzu biraz daha detaylı açıklayın.");
                return;
            }

            const btn = document.getElementById('sentezButonu');
            btn.innerHTML = 'SİSTEMİK BOYUTLAR ANALİZ EDİLİYOR...';
            btn.disabled = true;

            setTimeout(() => {
                const altMetin = metin.toLowerCase();

                // 1. BOYUT: Zaman Metresi Analizi (S - Z)
                let zamanAnalizi = "<strong>İlerisinde (Ebediyet Ufku):</strong> Durumunuz anlık dünya dertlerinin ötesinde, kalıcı ve uzun vadeli bir eylem bilinci içeriyor. Zaman çarpanı bereket yönünde çalışıyor.";
                if (altMetin.includes("vaktim yok") || altMetin.includes("zamanım az") || altMetin.includes("yetişemiyorum") || altMetin.includes("hemen") || altMetin.includes("geç kaldım")) {
                    zamanAnalizi = "<strong>Gerisinde (Zaman Sıkışması):</strong> Algoritma, değişken-sabit dünya zaman metresinin baskısı altında olduğunuzu tespit etti. Acelecilik ve vakitsizlik algısı, fiili yer değiştirme bereketini daraltıyor.";
                }

                // 2. BOYUT: Manevi Boyut Analizi (İhlas Vektörü)
                let maneviAnalizi = "<strong>Yüksek İhlas Potansiyeli:</strong> Niyetinizde doğrudan ilim, hizmet veya rıza odaklı bir yönelim algılandı. Manevi katsayı stabil.";
                if (altMetin.includes("para") || altMetin.includes("kazanç") || altMetin.includes("zenginlik") || altMetin.includes("şöhret")) {
                    maneviAnalizi = "<strong>Maddi Odak Riski:</strong> Durumunuzda maddi çıktı beklentisinin ihlas boyutunu gölgeleme riski var. Eylemi tamamen halis niyet çizgisine çekmelisiniz.";
                }

                // 3. BOYUT: Maddi Boyut ve Eylemsellik Analizi (Esbab)
                let maddiAnalizi = "<strong>Eyleme Hazır / Sebeplere Sarılan:</strong> Durumunuz durağan değil, bir çıkış yolu ve hareket arayışı barındırıyor.";
                if (altMetin.includes("yapamıyorum") || altMetin.includes("duruyorum") || altMetin.includes("korkuyorum") || altMetin.includes("erteliyorum")) {
                    maddiAnalizi = "<strong>Eylemsel Atalet (Durağanlık):</strong> Teorinin temeli harekettir. Fikir boyutunda kalıp fiili yer değiştirmeye (harekete) dökülmeyen niyetler değer üretemez.";
                }

                // 4. BOYUT: Dış Çevre Direnci Analizi
                let cevreAnalizi = "<strong>Direnç Düşük / Saha Temiz:</strong> Eyleminizi gerçekleştirmek için dış çevre şartları ve zemin uygun görünüyor.";
                if (altMetin.includes("çevrem") || altMetin.includes("engel") || altMetin.includes("baskı") || altMetin.includes("izin") || altMetin.includes("kimse")) {
                    cevreAnalizi = "<strong>Yüksek Dış Çevre Direnci:</strong> Etrafınızdaki sosyal veya fiziksel faktörler birleşme sahasını daraltıyor. Bu direnci kırmak için sabırla yer değiştirme alanınızı esnetmelisiniz.";
                }

                // Küresel Kütüphane Arşivi Entegrasyonu (Kuran ve Hadis)
                let ayetReferans = "Şüphesiz insan için kendi çalışmasından (emeğinden) başkası yoktur. (Necm, 39)";
                let hadisReferans = "Ameller niyetlere göredir. Herkese niyet ettiği şey vardır. (Buhari)";

                if (altMetin.includes("kitap") || altMetin.includes("yazmak") || altMetin.includes("ilim") || altMetin.includes("okumak")) {
                    ayetReferans = "Yaratan Rabbinin adıyla oku! O, insanı bir alaktan yarattı. Oku! Rabbin sonsuz kerem sahibidir. O, kalemle yazmayı öğretendir. (Alak, 1-4)";
                    hadisReferans = "İlim tahsil etmek amacıyla bir yola giren kimseye Allah, cennete çıkan yolu kolaylaştırır. (Müslim)";
                } else if (altMetin.includes("birlik") || altMetin.includes("insanlar") || altMetin.includes("topluluk") || altMetin.includes("ortak")) {
                    ayetReferans = "İyilik ve takva üzere yardımlaşın, günah ve düşmanlık üzere yardımlaşmayın. (Maide, 2)";
                    hadisReferans = "Mü'minin mü'mine karşı durumu, parçaları birbirini bağlayıp tahkim eden tek bir bina gibidir. (Buhari)";
                }

                // Eylemsel Görevler (Kişiyi ekrandan uzaklaştıran)
                let eylemGorevi1 = "Şimdi ekranı kapatın. Durumunuzda tespit edilen tıkanıklıkları aşmak adına, zihninizi durultmak için sessiz bir ortamda 15 dakika tefekkür edin.";
                let eylemGorevi2 = "Bugün hedefinize yönelik en küçük de olsa fiili bir adım atın (Bir sayfa yazın, bir araştırma yapın veya eyleminize ortak edeceğiniz o doğru kişiyle iletişime geçin).";

                document.getElementById('matrix-result-panel').innerHTML = `
                    <div style="margin-top: 25px; padding: 20px; background: #fffdf5; border: 1px solid #e3dec3; border-radius: 8px;">
                        <div style="text-align: center; margin-bottom: 15px; border-bottom: 1px solid #e3dec3; padding-bottom: 10px;">
                            <h3 style="font-size: 1.1rem; color: #231c14; letter-spacing: 1px;">BÜTÜNCÜL TEORİK DURUM RAPORU</h3>
                        </div>

                        <table class="action-table">
                            <thead>
                                <tr>
                                    <th style="width:30%;">Teorik Katman</th>
                                    <th style="width:70%;">Durum Analizi ve Algoritmik Çıktı</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td style="font-weight:bold;">ZAMAN METRESİ</td>
                                    <td>${zamanAnalizi}</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold;">MANEVİ BOYUT</td>
                                    <td>${maneviAnalizi}</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold;">MADDİ BOYUT</td>
                                    <td>${maddiAnalizi}</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold;">DIŞ ÇEVRE DİRENCİ</td>
                                    <td>${cevreAnalizi}</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold;">KÜRESEL ARŞİV<br><span class="source-tag">KURAN-I KERİM</span></td>
                                    <td style="font-style: italic;">"${ayetReferans}"</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold;">KÜRESEL ARŞİV<br><span class="source-tag">HADİS-İ ŞERİF</span></td>
                                    <td style="font-style: italic;">"${hadisReferans}"</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold; color: #7d6c55;">FİİLİ GÖREV 1</td>
                                    <td style="font-weight: 600;">👉 ${eylemGorevi1}</td>
                                </tr>
                                <tr>
                                    <td style="font-weight:bold; color: #7d6c55;">FİİLİ GÖREV 2</td>
                                    <td style="font-weight: 600;">👉 ${eylemGorevi2}</td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <div style="font-size:0.75rem; color:#7d6c55; text-align:center; margin-top:15px; font-style:italic; border-top: 1px solid #e3dec3; padding-top: 10px;">
                            *Görevlerinizi aldıysanız uygulamayı kapatıp eylemsel harekete geçiniz.
                        </div>
                    </div>
                `;

                btn.innerHTML = 'TEORİK SENTEZİ BAŞLAT';
                btn.disabled = false;
            }, 1200);
        });
    </script>
</body>
</html>
