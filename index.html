<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulus X - AI Decision Matrix</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --text-color: #f3f4f6;
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f35588;
            --success: #00ff87;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #8a99ad;
            font-size: 14px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #cbd5e1;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            border-radius: 8px;
            color: #0b0f19;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .report-card {
            margin-top: 30px;
            padding: 20px;
            background: #0f172a;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            display: none;
        }

        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .score-box {
            font-size: 24px;
            font-weight: bold;
            color: var(--success);
        }

        .section-title {
            font-size: 14px;
            color: var(--secondary);
            margin-top: 15px;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .quote-box {
            font-style: italic;
            background: #1e293b;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #94a3b8;
            border-left: 3px solid var(--accent);
        }

        ul {
            margin: 0;
            padding-left: 20px;
            font-size: 14px;
            color: #e2e8f0;
        }

        ul li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MODULUS X</h1>
    <div class="subtitle">AI Decision Matrix</div>

    <div class="form-group">
        <label for="alan">Alan Seçimi (X Değişkeni)</label>
        <select id="alan">
            <option value="Zihinsel ve İlmi Akademi">Zihinsel ve İlmi Akademi</option>
            <option value="Teknoloji ve Yazılım">Teknoloji ve Yazılım</option>
            <option value="Sosyal ve Kültürel Alan">Sosyal ve Kültürel Alan</option>
            <option value="Ticaret ve Finans">Ticaret ve Finans</option>
        </select>
    </div>

    <div class="row">
        <div class="form-group">
            <label for="maddi">Maddi Boyut (0-10)</label>
            <input type="number" id="maddi" min="0" max="10" value="5" step="0.1">
        </div>
        <div class="form-group">
            <label for="manevi">Manevi Boyut (0-10)</label>
            <input type="number" id="manevi" min="0" max="10" value="9" step="0.1">
        </div>
        <div class="form-group">
            <label for="dis">Dış Boyut (0-10)</label>
            <input type="number" id="dis" min="0" max="10" value="7" step="0.1">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label for="zamanS">Zaman S (Bireysel Seviye)</label>
            <input type="number" id="zamanS" value="2030">
        </div>
        <div class="form-group">
            <label for="zamanZ">Zaman Z (Dünya Ortalaması)</label>
            <input type="number" id="zamanZ" value="2023">
        </div>
    </div>

    <button id="btnAnaliz">MATRİSİ ÇALIŞTIR</button>

    <div class="report-card" id="reportCard">
        <div class="report-header">
            <div>
                <span style="color: #8a99ad; font-size: 12px;">MODEL TAHMİN PUANI (E)</span>
                <div class="score-box" id="resPuan">0</div>
            </div>
            <div style="text-align: right;">
                <span style="color: #8a99ad; font-size: 12px;">ML GÜCÜ</span>
                <div style="color: var(--primary); font-weight: bold;" id="resML">%85</div>
            </div>
        </div>

        <div class="section-title">📜 Kutsal Metin ve Felsefi Şerh</div>
        <div class="quote-box" id="resAyet"></div>
        <p style="font-size: 14px; margin-top: 8px; line-height: 1.4;" id="resSerh"></p>

        <div class="section-title">🎯 Olaya Özel Uygulanabilir Görevler</div>
        <ul>
            <li><strong>Eylemsel Plan:</strong> <span id="resEylem"></span></li>
            <li><strong>Birleşme Adımı:</strong> <span id="resBirlesme"></span></li>
            <li><strong>Boyut Dengesi:</strong> <span id="resDenge"></span></li>
        </ul>
    </div>
</div>

<script>
    // Mantık Motoru Sınıfı
    class ModulusXEngine {
        constructor(maddi, manevi, disBoyut, alanAdi, zamanS, zamanZ) {
            this.maddi = Math.max(0, Math.min(10, maddi));
            this.manevi = Math.max(0, Math.min(10, manevi));
            this.dis = Math.max(0, Math.min(10, disBoyut));
            this.alan = alanAdi;
            this.zamanS = zamanS;
            this.zamanZ = zamanZ;
            this.X = this.alan.includes("Akademi") || this.alan.includes("İlim") ? 1.5 : 1.0;
        }

        hesaplaYerDegistirme(yon = "+") {
            let temelBoyut = this.maddi + this.manevi + this.dis + this.X;
            return yon === "+" ? temelBoyut * 1.2 : temelBoyut * 0.8;
        }

        hesaplaBirlesme() {
            return (this.manevi * this.dis) + this.X;
        }

        tahminPuaniHesapla() {
            let zamanCarpani = this.zamanS - this.zamanZ;
            let yerDegistirme = this.hesaplaYerDegistirme("+");
            let birlesme = this.hesaplaBirlesme();
            let rawScore = (zamanCarpani * (yerDegistirme + birlesme)) * 15;
            return parseFloat(rawScore.toFixed(1));
        }

        getAISerh(tahminPuani) {
            let temelMetin = `"Zamana andolsun ki insan hüsrandadır. Ancak iman edip salih ameller işleyenler müstesna." [Asr Suresi]`;
            let yorum = "";

            if (this.manevi >= 8 && this.maddi < 6) {
                yorum = `Model, geçmiş başarı kombinasyonlarından yola çıkarak bu ilmi niyetin zaman çarpanını geleceğe taşıyacağını öngördü. Ancak zamansal ivmelenmenin kalıcı olması için maddi ve manevi boyutların eşit dengelenmesi şarttır.`;
            } else if (tahminPuani > 5000) {
                yorum = `Yüksek zaman çarpanı ve doğru yer değiştirme kombinasyonu saptandı. İlmi niyetiniz, toplumsal ortalamanın ilerisinde bir artı değer üreterek hüsran riskini minimize ediyor.`;
            } else {
                yorum = `Mevcut yer değiştirme fonksiyonu durağan seyrediyor. Zaman çarpanını artıya geçirmek için eylemsel planların hızlandırılması gerekmektedir.`;
            }

            return { kutsalMetin: temelMetin, yapayZekaYorumu: yorum };
        }

        generateGorevler() {
            let gorevler = {
                eylemselPlan: `"${this.alan}" alanında gelişim sağlamak için bugün acilen haftalık çalışma takviminizi ve stratejinizi hazırlayın.`,
                birlesmeAdimi: "Öğrendiğiniz veya ürettiğiniz bilgileri çevrenizdeki en az bir kişiye aktararak sistem faydası ve ağ etkisi yaratın.",
                boyutDengesi: "Mevcut boyut dağılımınız dengeli görünüyor, kararlılıkla devam edin."
            };

            if (this.maddi < 6 && this.manevi > 8) {
                gorevler.boyutDengesi = "Zihinsel ve ilmi yoğunluğunuz maksimum seviyede artarken, fiziksel/dünyevi boyut ihtiyaçlarınızı ve lojistiğinizi ihmal etmeyin.";
            } else if (this.dis < 5) {
                gorevler.boyutDengesi = "İçsel gelişiminiz güçlü ancak dış dünya, çevre ve ağ bağlarınız zayıf kalmış. Dış boyuta yatırım yapın.";
