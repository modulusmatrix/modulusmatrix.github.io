<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulus X - Full Formula AI Matrix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f111a; color: #e2e8f0; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 20px auto; background: #1a1c2a; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #00f2fe; text-align: center; font-size: 22px; margin-bottom: 5px; letter-spacing: 1px; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 12px; margin-bottom: 20px; }
        .section-title { color: #38bdf8; font-size: 14px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-top: 15px; margin-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 13px; }
        input, textarea { width: 100%; padding: 8px; background: #0f111a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        textarea { resize: vertical; min-height: 70px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; border-radius: 6px; color: #0f111a; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 15px; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .positive { background: rgba(16, 185, 129, 0.08); border: 1px solid #10b981; }
        .negative { background: rgba(239, 68, 68, 0.08); border: 1px solid #ef4444; }
        .analysis-text { font-size: 14px; margin: 10px 0; line-height: 1.5; }
        .source { font-size: 12px; color: #a78bfa; margin-top: 10px; display: block; font-weight: bold; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 4px; }
        .component-output { font-size: 12px; color: #38bdf8; margin-bottom: 5px; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <h1>MODULUS X MATRIX</h1>
    <div class="subtitle">1. FÖRMÜL AÇILIMI VE YAPAY ZEKA SİSTEMİ</div>
    
    <div class="section-title">1.1. Zaman Çarpanı (ZAMAN = S - Z)</div>
    <div class="form-grid">
        <div class="form-group"><label>S (İleri/Geri Zaman Dilimi):</label><input type="number" id="sValue" value="2100"></div>
        <div class="form-group"><label>Z (Sabit Dünya Zamanı):</label><input type="number" id="zValue" value="2030"></div>
    </div>

    <div class="section-title">1.2. Boyut Bileşenleri (Maddi + Manevi + Dış + X)</div>
    <div class="form-grid">
        <div class="form-group"><label>Maddi Boyut (1-10):</label><input type="number" id="maddi" value="8"></div>
        <div class="form-group"><label>Manevi Boyut (1-10):</label><input type="number" id="manevi" value="9"></div>
        <div class="form-group"><label>Dış Boyut (1-10):</label><input type="number" id="dis" value="7"></div>
        <div class="form-group"><label>X Alanı Adı:</label><input type="text" id="xAlani" value="Mekke"></div>
    </div>

    <div class="section-title">1.3. Serbest Değer ve Niyet Değerlendirmesi</div>
    <div class="form-group">
        <label>Hedeflenen Eylem / Durum İfadesi:</label>
        <textarea id="userText" placeholder="Örn: İlim öğrenmek amacıyla hicret etmek istiyorum..."></textarea>
    </div>

    <button onclick="analizEt()">MATRİSİ TAM KAPASİTE ÇALIŞTIR</button>
    <div id="result" class="result-box"></div>
</div>

<script>
const ISLAMIC_DB = {
    pozitif: [
        { kaynak: "Asr Suresi 1-3", metin: "Zamana andolsun ki insan hüsrandadır. Ancak iman edip salih ameller işleyenler, birbirlerine hakkı ve sabrı tavsiye edenler müstesna." },
        { kaynak: "Nisa Suresi 100", metin: "Allah yolunda hicret eden kimse, yeryüzünde gidecek çok yer ve bolluk bulur." },
        { kaynak: "Hadis-i Şerif (Buhari)", metin: "İlim aramak amacıyla bir yola giren kimseye Allah cennet yolunu kolaylaştırır." }
    ],
    negatif: [
        { kaynak: "Furkan Suresi 27", metin: "O gün zalim ellerini ısırarak: Keşke peygamberle birlikte bir yol tutsaydım der." },
        { kaynak: "Hadis-i Şerif (Tirmizi)", metin: "Kul bir günah işlediği zaman kalbinde siyah bir nokta oluşur. Eğer tövbe etmezse o nokta kalbini kaplar." },
        { kaynak: "Tekasür Suresi 1-2", metin: "Çoğaltma yarışı (hırsı) sizi oyaladı; ta kabirlere varıncaya kadar." }
    ]
};

function analizEt() {
    const s = parseFloat(document.getElementById('sValue').value);
    const z = parseFloat(document.getElementById('zValue').value);
    const maddi = parseFloat(document.getElementById('maddi').value);
    const manevi = parseFloat(document.getElementById('manevi').value);
    const dis = parseFloat(document.getElementById('dis').value);
    const xAlani = document.getElementById('xAlani').value;
    const userText = document.getElementById('userText').value.toLowerCase();
    
    // 1.1 ZAMAN ÇARPANINI HESAPLA
    const zaman = s - z;
    
    // X alanı uzunluğuna göre dinamik bir alan ağırlığı (Yapay Zeka katsayısı)
    const xAgirlik = xAlani.trim().length > 0 ? 5 : 1; 
    
    // 1.2 YER DEĞİŞTİRME FONSİYONU: Dokümandaki ((B1) ± (B2)) mantığı
    const yerDegistirme = (maddi + manevi + dis + xAgirlik) * 1.2;
    
    // 1.3 BİRLEŞME FONKSİYONU: Dokümandaki ((B1) * (B2)) çarpımsal etki mantığı
    const birlesme = (maddi + manevi + dis + xAgirlik) * 0.8;
    
    // YAPAY ZEKA METİN ANALİZİ VE DEĞER DEĞİŞKENİ BASKILAMASI
    let aiMetinKatsayisi = 1.0;
    let niyetYorumu = "";
    
    const pozitifKelimeler = ["hicret", "ilim", "sabır", "öğren", "salih", "şükür", "iyilik", "yardım"];
    const negatifKelimeler = ["hırs", "para", "israf", "tembellik", "korkmuyorum", "günah", "gunah", "yalan"];

    let pozitifPuan = pozitifKelimeler.filter(k => userText.includes(k)).length;
    let negatifPuan = negatifKelimeler.filter(k => userText.includes(k)).length;

    if (userText.includes("günah") || userText.includes("gunah") || userText.includes("korkmuyorum")) {
        negatifPuan += 3;
    }

    if (pozitifPuan > 0 || negatifPuan > 0) {
        if (pozitifPuan >= negatifPuan) {
            aiMetinKatsayisi = 1.3;
            niyetYorumu = "Niyet Analizi: Pozitif ve ivmeli bir manevi arayış saptandı.";
        } else {
            aiMetinKatsayisi = -2.0; 
            niyetYorumu = "Niyet Analizi: Cümlede sorumluluk bilincinden uzaklaşma veya hüsran riski saptandı.";
        }
    } else {
        niyetYorumu = "Niyet Analizi: Nötr durum girdisi yapıldı.";
    }

    // FORMÜL TAM HESAPLAMASI: Zaman * (Yer Değiştirme * Birleşme) * Yapay Zeka Etkisi
    const netDeger = zaman * (yerDegistirme * birlesme) * aiMetinKatsayisi;
    
    const resultBox = document.getElementById('result');
    resultBox.style.display = 'block';
    
    let durumYorumu = "";
    let secilenRef = {};

    if (netDeger > 0) {
        resultBox.className = "result-box positive";
        durumYorumu = `<strong>[+] Değer = Doğru yer değiştirme maksimum değer kazancı.</strong><br><br>
        <strong>Yer Değiştirme Yorumu:</strong> Belirtilen "${xAlani}" alanına doğru hareket, maddi ve manevi boyutlarınızı pozitif yönde ivmelendirmiştir. Zaman çarpanınız bulunduğunuz anın ilerisinde (artı değerde) bir bilinç düzeyi sunmaktadır.<br><br>
        <strong>Birleşme Yorumu:</strong> Maddi ve manevi enerjileriniz dış boyut ile kusursuz bütünleşerek toplumsal veya bireysel bir sıçrama (Bereket/Kazanç) oluşturmuştur.`;
        secilenRef = ISLAMIC_DB.pozitif[Math.floor(Math.random() * ISLAMIC_DB.pozitif.length)];
    } else {
        resultBox.className = "result-box negative";
        durumYorumu = `<strong>[-] Değer = Yanlış yer değiştirme maksimum değer kaybedişi (Hüsran).</strong><br><br>
        <strong>Yer Değiştirme Yorumu:</strong> Yapılan eylem veya seçilen "${xAlani}" alanı, boyut bileşenlerinizde dengesizlik yaratarak istikrarsızlığa yol açmıştır. Zaman çarpanı sizi geriye doğru çekmektedir.<br><br>
        <strong>Birleşme Yorumu:</strong> Maddi ve manevi unsurlarınız dış dünya ile yapıcı bir bağ kuramamış, bütünleşme krizine yol açarak sistemin çöküşüne (Maksimum Değer Kaybına) neden olmuştur.`;
        secilenRef = ISLAMIC_DB.negatif[Math.floor(Math.random() * ISLAMIC_DB.negatif.length)];
    }

    resultBox.innerHTML = `
        <div class="component-output">Δ Zaman (S-Z): ${zaman > 0 ? '+' : ''}${zaman}</div>
        <div class="component-output">Yer Değiştirme Katsayısı: ${yerDegistirme.toFixed(1)}</div>
        <div class="component-output">Birleşme Katsayısı: ${birlesme.toFixed(1)}</div>
        <div class="component-output">Net Matris Değeri: ${netDeger.toFixed(1)}</div>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;">
        <div class="ai-note">${niyetYorumu}</div>
        <div class="analysis-text">${durumYorumu}</div>
        <span class="source">[${secilenRef.kaynak}]: "${secilenRef.metin}"</span>
    `;
}
</script>
</body>
</html>
