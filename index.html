<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

<script type="module">
  import { GoogleGenAI } from "@google/generative-ai";

  // Fonksiyonu dışarıdan erişilebilir kılmak için pencere nesnesine bağlıyoruz
  window.analizEt = async function() {
    const GEMINI_API_KEY = document.getElementById('api-key-input').value.trim();
    const userInput = document.getElementById('user-input').value;

    if (!GEMINI_API_KEY) {
        alert('Lütfen önce Google AI Studio API anahtarınızı girin.');
        return;
    }
    if (!userInput.trim()) {
        alert('Lütfen analiz için durumunuzu yazın.');
        return;
    }

    const button = document.querySelector('button');
    const originalButtonText = button.innerText;
    button.innerText = "Formül Hesaplanıyor, Lütfen Bekleyin...";
    button.disabled = true;

    try {
        // Resmi kütüphane üzerinden bağlantı kuruyoruz
        const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
        
        const sistemTalimati = `
        Sen MODULUS X uygulamasının ahlaki, felsefi ve matematiksel değer motorusun. 
        Sana gelen girdileri şu anayasaya göre analiz edeceksin:
        1. Temel formül: Değer = Zaman * (Yer Değiştirme * Birleşme).
        2. Temel kaynaklar: Önce Kuran-ı Kerim, sonra Hadis-i Şerifler, ardından asrın fehmiyle Risale-i Nur Külliyatı (İhlas, Tevekkül, Esbab ve Rızık hakikatleri).
        3. "İnsan sadece yer değiştirme ve birleşme yapar, değeri Allah yaratır" (YBT, sf. 18, Bayram Gedikli) düsturunu mutlak merkez alacaksın.

        Kullanıcının yazdığı duruma göre tamamen dinamik, derin, edebi (roman sayfası sakinliğinde) ve özgün bir analiz yap. Şablon cümleler kurma. 
        Çıktıyı kesinlikle başka hiçbir açıklama metni eklemeden, SADECE VE SADECE şu JSON formatında geri döndür:
        {
          "badge_type": "red" veya "yellow" veya "green",
          "badge_text": "DURUM BAŞLIĞI",
          "title": "Özgün Değerlendirme Başlığı",
          "desc": "Kullanıcının durumuna özel, formüldeki Zaman, Yer Değiştirme ve Birleşme çarpanlarını tek tek inceleyen derin analiz yazısı...",
          "quote": "Duruma tam oturan Kuran veya Hadis referansı ve ayet/sure numarası...",
          "kulliyat": "Duruma özel; Esbab, İhlas veya Tevekkül odaklı külliyat tefsir analizi...",
          "tasks": ["Kullanıcının atması gereken 1. fiili adım", "2. fiili adım", "3. fiili adım"]
        }
        `;

        const response = await ai.models.generateContent({
            model: 'gemini-1.5-flash',
            contents: sistemTalimati + "\n\nKullanıcı Durumu: " + userInput,
        });

        let rawText = response.text;
        rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
        const sonuc = JSON.parse(rawText);

        const badgeContainer = document.getElementById('status-badge-container');
        badgeContainer.innerHTML = `<span class="status-badge badge-${sonuc.badge_type}"><i class="fa-solid fa-circle-info"></i> ${sonuc.badge_text}</span>`;
        
        document.getElementById('report-title').innerText = sonuc.title;
        document.getElementById('report-desc').innerHTML = sonuc.desc;
        document.getElementById('sacred-quote').innerHTML = sonuc.quote;
        document.getElementById('kulliyat-content').innerHTML = sonuc.kulliyat;

        const tasksUl = document.getElementById('tasks');
        tasksUl.innerHTML = "";
        sonuc.tasks.forEach(task => {
            tasksUl.innerHTML += `<li>${task}</li>`;
        });

        const certificate = document.getElementById('certificate');
        if (sonuc.badge_type === 'red') {
            certificate.style.display = 'block';
        } else {
            certificate.style.display = 'none';
        }

        document.getElementById('input-screen').style.display = 'none';
        document.getElementById('report-screen').style.display = 'block';

    } catch (error) {
        console.error(error);
        alert('Yapay zeka motoru bağlanırken resmi kütüphane hatası oluştu. Lütfen anahtarınızı kontrol edin.');
    } finally {
        button.innerText = originalButtonText;
        button.disabled = false;
    }
  }

  window.başaDön = function() {
      document.getElementById('input-screen').style.display = 'flex';
      document.getElementById('report-screen').style.display = 'none';
      document.getElementById('user-input').value = '';
  }
</script>
