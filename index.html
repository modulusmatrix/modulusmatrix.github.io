<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULUS X | Yer Değiştirme ve Birleşme Teorisi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #161b26; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #d1dcf0;
            padding: 20px;
        }
        
        .matrix-core {
            background: #1f2736;
            border: 1px solid #2b354a;
            border-radius: 16px;
            width: 100%;
            max-width: 620px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(10, 15, 26, 0.4);
        }

        /* En Üstte Kalan Mat Sarı Roman Stili Panel */
        .theory-essence-box {
            background-color: #fffef0; 
            border: 1px solid #eadeb8;
            border-radius: 12px;
            padding: 18px 15px;
            margin-bottom: 15px; /* Alt boşluk azaltıldı, yukarıda kalması sağlandı */
            text-align: center;
        }

        .essence-text {
            font-family: 'Times New Roman', Times, Georgia, serif; 
            font-size: 1.25rem;
            font-weight: 700;
            color: #231c14; 
            line-height: 1.4;
            margin-bottom: 8px;
            font-style: italic;
        }

        /* Sayfa Bilgisi Eklenmiş Küçük Punto Footer */
        .essence-footer {
            font-family: 'Times New Roman', Times, Georgia, serif;
            font-size: 0.75rem; /* Küçük punto yapıldı */
            color: #6e5d47;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-top: 1px solid #ebdca5;
            padding-top: 6px;
            display: inline-block;
            width: 90%;
        }
        
        .system-header { text-align: center; margin-bottom: 15px; }
        .system-title { font-size: 1.7rem; font-weight: 800; color: #4fc3f7; letter-spacing: 3px; display: block; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.8rem; color: #8fa3bf; margin-bottom: 4px; font-weight: 600; }
        
        .row { display: flex; gap: 12px; }
        .col { flex: 1; }

        .eq-param {
            width: 100%;
            background: #1a212e;
            border: 1px solid #34445c;
            border-radius: 8px;
            padding: 10px 12px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }
        .eq-param:focus { border-color: #4fc3f7; background: #20293a; }
        
        /* Net ve Görünür Buton Alanı */
        .btn-matrix {
            width: 100%; 
            background: linear-gradient(135deg, #0288d1 0%, #01579b 100%); 
            border: none; 
            border-radius: 8px;
            padding: 15px; 
            color: #ffffff; 
            font-weight: 700; 
            font-size: 0.95rem;
            cursor: pointer; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
            transition: all 0.2s ease; 
            margin-top: 10px;
            display: block; /* Görünürlüğü garanti altına alır */
        }
        .btn-matrix:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(2, 136, 209, 0.4); }
        .btn-matrix:disabled { background: #2c374e; color: #526480; cursor: not-allowed; }

        .action-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .action-table th { color: #4fc3f7; font-size: 0.75rem; text-align: left; padding: 8px; border-bottom: 2px solid #222c3d; text-transform: uppercase; }
        .action-table td { padding: 10px 8px; font-size: 0.8rem; border-bottom: 1px solid #1a212e; color: #e2e8f0; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="matrix-core">
        
        <div class="theory-essence-box">
            <div class="essence-text">
                "İnsan sadece yer değiştirme ve birleşme yapar, değeri yaratan Allah'tır."
            </div>
            <div class="essence-footer">
                Yer Değiştirme ve Birleşme Kitabı (Sayfa 18) — Bayram Gedikli
            </div>
        </div>

        <div class="system-header">
            <span class="system-title">MODULUS X</span>
        </div>

        <div class="row">
            <div class="col input-group">
                <label for="zamanS">S (Hedeflenen İleri Zaman Boyutu)</label>
                <input type="number" id="zamanS" class="eq-param" value="2100">
            </div>
            <div class="col input-group">
                <label for="zamanZ">Z (Sabit Dünya Zaman Metresi)</label>
                <input type="number" id="zamanZ" class="eq-param" value="2026">
            </div>
        </div>

        <div class="row">
            <div class="col input-group">
                <label for="maneviBoyut">Manevi Boyut (İhlas / 0-10)</label>
                <input type="number" id="maneviBoyut" class="eq-param" min="0" max="10" value="9">
            </div>
            <div class="col input-group">
                <label for="maddiBoyut">Maddi Boyut (Esbab / 0-10)</label>
                <input type="number" id="maddiBoyut" class="eq-param" min="0" max="10" value="5">
            </div>
            <div class="col input-group">
                <label for="disBoyut">Dış Çevre Direnci (0-10)</label>
                <input type="number" id="disBoyut" class="eq-param" min="0" max="10" value="7">
            </div>
        </div>

        <div class="input-group">
            <label for="xAlani">X_Sahası (Kulun Yapacağı Fiili Yer Değiştirme)</label>
            <input type="text" id="xAlani" class="eq-param" value="Kitap Yazmak ve Bilgi Yaymak">
        </div>

        <div class="input-group">
            <label for="birlesmeAlani">Birleşme Sahası (Entegre Olunacak İttifak/Ekosistem)</label>
            <input type="text" id="birlesmeAlani" class="eq-param" value="Dijital Yayıncılık ve İslam Gençlik Halkası">
        </div>

        <button class="btn-matrix" id="sentezButonu">TEORİK SENTEZİ ÇALIŞTIR</button>
        
        <div id="matrix-result-panel"></div>
    </div>

    <script>
        document.getElementById('sentezButonu').addEventListener('click', function() {
            const xAlani = document.getElementById('xAlani').value.trim();
            const birlesmeAlani = document.getElementById('birlesmeAlani').value.trim();
            const maddi = parseFloat(document.getElementById('maddiBoyut').value) || 0;
            const manevi = parseFloat(document.getElementById('maneviBoyut').value) || 0;
            const disBoyut = parseFloat(document.getElementById('disBoyut').value) || 0;
            const zamanS = parseInt(document.getElementById('zamanS').value) || 2026;
            const zamanZ = parseInt(document.getElementById('zamanZ').value) || 2026;

            if (!xAlani || !birlesmeAlani) {
                alert("Teorik Hata: Alanlar boş bırakılamaz.");
                return;
            }

            const btn = document.getElementById('sentezButonu');
            btn.innerHTML = 'KUL YER DEĞİŞTİRİYOR...';
            btn.disabled = true;

            setTimeout(() => {
                const zamanMetresi = zamanS - zamanZ;
                const maneviKatsayi = manevi * 1.5; 
                const maddiKatsayi = maddi * 0.8; 
                const disCevreEtkisi = disBoyut > 0 ? (disBoyut * 0.2) : 0.5;

                const netTeoriSkoru = ((maddiKatsayi + maneviKatsayi) / disCevreEtkisi) * (zamanMetresi === 0 ? 1 : zamanMetresi);
                const isPositive = netTeoriSkoru > 0 && manevi >= 6;

                const softGreen = "#4ade80";
                const softRed = "#f87171";

                let stratejiRaporu = "";

                if (zamanMetresi <= 0) {
                    stratejiRaporu += `
                        <tr>
                            <td style="color:${softRed}; font-weight:bold;">ZAMANSAL RİSK</td>
                            <td><strong>Zamana Tapma Tehdidi:</strong> Dünya zaman metresinin esiri olma riski var. S-Z çarpanını büyütmek için eylemi ebediyet vizyonuyla kodlayın.</td>
                            <td style="color:#8fa3bf; font-size:0.75rem;">"Zamana tapan bereketi kaybeder."</td>
                        </tr>`;
                } else {
                    stratejiRaporu += `
                        <tr>
                            <td style="color:${softGreen}; font-weight:bold;">ZAMANSAL BEREKET</td>
                            <td><strong>Gelecek Ufku:</strong> Zaman metresinin ${zamanMetresi} birim ötesindesiniz. Bu eylem bir saati 300 gün gibi bereketli kılacaktır.</td>
                            <td style="color:#8fa3bf; font-size:0.75rem;">Zaman Genişlemesi Aktif</td>
                        </tr>`;
                }

                stratejiRaporu += `
                    <tr>
                        <td style="color:#ffb74d; font-weight:bold;">MUTLAK HAKİKAT</td>
                        <td><strong>Değer Yaratımı İllüzyonu:</strong> [${xAlani}] sahasında kul olarak siz asla değer yaratamazsınız. Siz sadece yer değiştirirsiniz. Değeri yaratacak tek merci Allah'tır.</td>
                        <td style="color:#8fa3bf; font-size:0.75rem;">"Değeri Allah ortaya çıkarır."</td>
                    </tr>`;

                if (manevi < 6) {
                    stratejiRaporu += `
                        <tr>
                            <td style="color:${softRed}; font-weight:bold;">MANEVİ TEHDİT</td>
                            <td><strong>Niyet Sapması:</strong> Maddi çıkar algısı ihlası gölgelemiş. Eylemi sadece Allah rızası eksenine oturtun.</td>
                            <td style="color:#8fa3bf; font-size:0.75rem;">"Ruhsuz eylem cesettir."</td>
                        </tr>`;
                } else {
                    stratejiRaporu += `
                        <tr>
                            <td style="color:${softGreen}; font-weight:bold;">İHLAS KORUMASI</td>
                            <td><strong>Kalbi Kararlılık:</strong> Manevi katsayınız tam. Bu ihlas gücünü, [${birlesmeAlani}] sahasında doğru helal birleşmelerle taçlandırma vaktidir.</td>
                            <td style="color:#8fa3bf; font-size:0.75rem;">Manevi Vektör Stabil</td>
                        </tr>`;
                }

                document.getElementById('matrix-result-panel').innerHTML = `
                    <div style="margin-top: 20px; padding: 15px; background: #121721; border: 1px solid #222c3d; border-radius: 10px;">
                        <div style="text-align: center; margin-bottom: 12px; border-bottom: 1px solid #1f2736; padding-bottom: 10px;">
                            <span style="font-size:0.7rem; color:#8fa3bf; letter-spacing:1px; text-transform:uppercase;">İLÂHİ DEĞER VE SENTEZ RAPORU</span>
                            <h3 style="color:${isPositive ? softGreen : softRed}; font-size:1rem; margin-top:5px;">
                                ${isPositive ? `✓ MATRİS DENGEDE: Kul Sebeplere Sarılarak Yer Değiştirdi` : `⚠ SİSTEMİK SAPMA: Maddi Odaklanma`}
                            </h3>
                        </div>

                        <table class="action-table">
                            <thead>
                                <tr>
                                    <th style="width:25%;">Teorik Katman</th>
                                    <th style="width:50%;">Algoritmik Eylem Sonucu</th>
                                    <th style="width:25%;">Teori Esası</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${stratejiRaporu}
                            </tbody>
                        </table>
                    </div>
                `;

                btn.innerHTML = 'TEORİK SENTEZİ ÇALIŞTIR';
                btn.disabled = false;
            }, 1000);
        });
    </script>
</body>
</html>
