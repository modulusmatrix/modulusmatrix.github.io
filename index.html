<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Canlı Sentez Motoru</title>
    <style>
        body { font-family: 'Times New Roman', serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #fdfbf7; }
        textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; }
        button { width: 100%; padding: 15px; background: #231c14; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>MODULUS X</h1>
    <p><i>"İnsan sadece yer değiştirme ve birleşme yapar; değeri Allah yaratır."</i></p>
    
    <textarea id="input" placeholder="Yer değiştirme ve birleşme çabanı yaz..."></textarea>
    <button onclick="canliSentez()">CANLI SENTEZİ BAŞLAT</button>
    <div id="cikti" style="margin-top:20px; font-weight:bold;"></div>

    <script>
        function canliSentez() {
            const giris = document.getElementById('input').value;
            const cikti = document.getElementById('cikti');
            
            if(!giris) { cikti.innerText = "Lütfen bir eylem veya niyet yazın."; return; }

            let analiz = "TEORİK ANALİZ:\n\n";
            analiz += "• FİİLİ EYLEM: " + giris + "\n";
            analiz += "• TEORİK DURUM: İnsan yer değiştirme ve birleşme fiilini gerçekleştiriyor.\n";
            analiz += "• HAKİKAT: Çaba sizden, değeri yaratmak ve neticeyi halk etmek Allah'tandır.\n";
            
            cikti.innerText = analiz;
        }
    </script>
</body>
</html>
