<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulus X - AI Decision Matrix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f111a; color: #e2e8f0; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 20px auto; background: #1a1c2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #00f2fe; text-align: center; font-size: 22px; margin-bottom: 20px; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; background: #0f111a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; min-height: 80px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; border-radius: 6px; color: #0f111a; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
        .positive { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; }
        .negative { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; }
        .source { font-size: 12px; color: #38bdf8; margin-top: 8px; display: block; font-weight: bold; }
        .ai-note { font-size: 13px; color: #a78bfa; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h1>MODULUS X MATRIX</h1>
    <div class="form-group"><label>S (İleri Zaman Seviyesi):</label><input type="number" id="sValue" value="2100"></div>
    <div class="form-group"><label>Z (Sabit Dünya Zamanı):</label><input type="number" id="zValue" value="2030"></div>
    <div class="form-group"><label>Maddi Boyut Değeri (1-10):</label><input type="number" id="maddi" value="8"></div>
    <div class="form-group"><label>Manevi Boyut Değeri (1-10):</label><input type="number" id="manevi" value="9"></div>
    
    <!-- İnsanın İstediğini Yazacağı Yeni Serbest Değer Kutusu -->
    <div class="form-group">
        <label>Hedeflenen Eylem / Durum Değerlendirmesi (Serbest Metin):</label>
        <textarea id="userText" placeholder="Örn: İlim öğrenmek için hicret etmek istiyorum veya Dünya malı için çok hırslıyım..."></textarea>
    </div>

    <button onclick="analizEt()">MATRİSİ ÇALIŞTIR</button>
    <div id="result" class="result-box"></div>
</div>
<script>
const ISLAMIC_DB = {
    pozitif: [
        { kaynak: "Asr Suresi 1-3", metin: "Zamana andolsun ki insan hüsrandadır. Ancak iman edip salih ameller işleyenler müstesna." },
        { kaynak: "Nisa Suresi 100", metin: "Allah yolunda hicret eden kimse, yeryüzünde gidecek çok yer ve bolluk bulur." },
        { kaynak: "Hadis-i Şerif (Buhari)", metin: "İlim aramak amacıyla bir yola giren kimseye Allah cennet yolunu kolaylaştırır." },
        { kaynak: "Mülk Suresi 15", metin: "Yeryüzünde yürüyün ve Allah'ın rızkından yiyin. Dönüş ancak O'nadadır." }
    ],
    negatif: [
        { kaynak: "Furkan Suresi 27", metin: "O gün zalim ellerini ısırarak: Keşke peygamberle birlikte bir yol tutsaydım der." },
        { kaynak: "Hadis-i Şerif (Tirmizi)", metin: "İnsanoğlunun iki vadi dolusu altını olsa üçüncüsünü ister. Onun gözünü ancak toprak doyurur." },
        { kaynak: "Tekasür Suresi 1-2", metin: "Çoğaltma yarışı (hırsı) sizi oyaladı; ta kabirlere varıncaya kadar." },
        { kaynak: "Hadis-i Şerif (Müslim)", metin: "Dünya sevgisi her çeşit hatalı davranışın başıdır." }
    ]
};

function analizEt() {
    const s = parseFloat(document.getElementById('sValue').value);
    const z = parseFloat(document.getElementById('zValue').value);
    const maddi = parseFloat(document.getElementById('maddi').value);
    const manevi = parseFloat(document.getElementById('manevi').value);
    const userText = document.getElementById('userText').value.toLowerCase();
    
    let zaman = s - z;
    let boyutToplami = maddi + manevi;
    let aiMetinKatsayisi = 1.0;
    let aiYorumu = "";
    let secilenRef = {};

    // YAPAY ZEKA METİN ANALİZ MOTORU
    const pozitifKelimeler = ["hicret", "ilim", "sabır", "öğren", "salih", "şükür", "iyilik", "yardım"];
    const negatifKelimeler = ["hırs", "para", "israf", "tembellik", "korku", "yalan", "dünya malı"];

    let pozitifPuan = pozitifKelimeler.filter(k => userText.includes(k)).length;
    let negatifPuan = negatifKelimeler.filter(k => userText.includes(k)).length;

    if (pozitifPuan > 0 || negatifPuan > 0) {
        if (pozitifPuan >= negatifPuan) {
            aiMetinKatsayisi = 1.5; // Formül sonucunu olumlu etkiler
            aiYorumu = "Yapay Zeka Analizi: Yazdığınız metinde yüksek manevi ve gelişim odaklı niyet tespit edildi. Formül çarpanı pozitif yönde desteklendi.";
            // Metne göre özel eşleştirme
            secilenRef = userText.includes("hicret") ? ISLAMIC_DB.pozitif[1] : (userText.includes("ilim") ? ISLAMIC_DB.pozitif[2] : ISLAMIC_DB.pozitif[0]);
        } else {
            aiMetinKatsayisi = -1.2; // Formül sonucunu olumsuz etkiler
            aiYorumu = "Yapay Zeka Analizi: Yazılan metinde dünyaya veya hırsa yönelik hüsran riskleri saptandı. Formül çarpanı negatif yönde etkilendi.";
            secilenRef = userText.includes("hırs") ? ISLAMIC_DB.negatif[1] : (userText.includes("dünya") ? ISLAMIC_DB.negatif[3] : ISLAMIC_DB.negatif[0]);
        }
    } else {
        aiYorumu = "Yapay Zeka Analizi: Standart formül girdi analizi uygulandı.";
        secilenRef = (zaman * boyutToplami) > 0 ? ISLAMIC_DB.pozitif[0] : ISLAMIC_DB.negatif[0];
    }

    // Matematiksel Formül Çözümü
    const netDeger = zaman * boyutToplami * aiMetinKatsayisi;
    const resultBox = document.getElementById('result');
    resultBox.style.display = 'block';
    
    if(netDeger > 0) {
        resultBox.className = "result-box positive";
        resultBox.innerHTML = `<strong>Net Değer: +${netDeger.toFixed(1)} (Maksimum Değer Kazancı)</strong><br><p class="ai-note">${aiYorumu}</p><p>DURUM: Zamanı ve seçilen alanı doğru değerlendirdiniz.</p><span class="source">[${secilenRef.kaynak}]: "${secilenRef.metin}"</span>`;
    } else {
        resultBox.className = "result-box negative";
        resultBox.innerHTML = `<strong>Net Değer: ${netDeger.toFixed(1)} (Maksimum Değer Kaybı)</strong><br><p class="ai-note">${aiYorumu}</p><p>DURUM: Yanlış yer değiştirme veya niyet kaynaklı kayıp riski.</p><span class="source">[${secilenRef.kaynak}]: "${secilenRef.metin}"</span>`;
    }
}
</script>
</body>
</html>
