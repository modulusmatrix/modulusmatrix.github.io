<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULUS X | 1. Formül Açılımı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0c111a;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        .matrix-container {
            background: #121824;
            border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .matrix-title { font-size: 2.2rem; font-weight: 800; color: #00f2fe; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
        .matrix-subtitle { font-size: 0.85rem; color: #52667a; text-transform: uppercase; letter-spacing: 4px; text-align: center; margin-bottom: 30px; }
        
        /* Felsefi Değer Kutusu Stili */
        .value-group {
            margin-bottom: 22px;
            padding: 15px;
            background: rgba(224, 0, 255, 0.05);
            border: 1px dashed rgba(224, 0, 255, 0.3);
            border-radius: 10px;
        }
        
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #a3b8cc; margin-bottom: 6px; font-weight: 500; }
        .form-control {
            width: 100%; background: #172030; border: 1px solid #222f47; border-radius: 8px;
            padding: 12px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s;
        }
        .form-control:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .form-control.value-input:focus { border-color: #e000ff; box-shadow: 0 0 10px rgba(224, 0, 255, 0.3); }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .btn-calistir {
            width: 100%; background: linear-gradient(90deg, #00c6ff 0%, #0072ff 100%); border: none;
            border-radius: 8px; padding: 16px; color: #fff; font-weight: 700; font-size: 1rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); transition: all 0.3s;
        }
        .btn-calistir:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(0, 242, 254, 0.6); }
        #matrix-result-panel { width: 100%; }
    </style>
</head>
<body>

    <div class="matrix-container">
        <div class="matrix-title">Modulus X</div>
        <div class="matrix-subtitle">1. Formül Açılımı Sistemi</div>

        <div class="value-group">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="uretilecekDeger" style="color: #e000ff; font-weight: 700; letter-spacing: 1px;">✨ Üretilecek Hedef Değer (Çıktı)</label>
                <input type="text" id="uretilecekDeger" class="form-control value-input" style="border-color: rgba(224, 0, 255, 0.4);" placeholder="Örn: Helal kazanç, İlim yaymak, Küresel başarı">
            </div>
        </div>

        <div class="form-group">
            <label for="xAlani">X Alanı (Derdiniz, Sıkıntınız veya Projeniz)</label>
            <input type="text" id="xAlani" class="form-control" placeholder="Örn: İngilizce öğrenmek, Yeni bir iş kurmak">
        </div>

        <div class="form-group grid-3">
            <div>
                <label style="font-size:0.75rem;">Maddi (0-10)</label>
                <input type="number" id="maddiBoyut" class="form-control" min="0" max="10" value="5">
            </div>
            <div>
                <label style="font-size:0.75rem;">Manevi (0-10)</label>
                <input type="number" id="maneviBoyut" class="form-control" min="0" max="10" value="9">
            </div>
            <div>
                <label style="font-size:0.75rem;">Dış Boyut (0-10)</label>
                <input type="number" id="disBoyut" class="form-control" min="0" max="10" value="7">
            </div>
        </div>

        <div class="form-group grid-2">
            <div>
                <label style="font-size:0.75rem;">Zaman S (Bireysel)</label>
                <input type="number" id="zamanS" class="form-control" value="2030">
            </div>
            <div>
                <label style="font-size:0.75rem;">Zaman Z (Dünya)</label>
                <input type="number" id="zamanZ" class="form-control" value="2026">
            </div>
        </div>

        <div class="form-group">
            <label for="birlesmeAlani">Birleşme Sahası (Entegre Olunacak Çevre)</label>
            <input type="text" id="birlesmeAlani" class="form-control" placeholder="Örn: Küresel pazar, Dil akademisi">
        </div>

        <button class="btn-calistir">MATRİSİ ÇALIŞTIR</button>
        
        <div id="matrix-result-panel"></div>
    </div>

    <script src="matrix-engine.js"></script>
</body>
</html>
