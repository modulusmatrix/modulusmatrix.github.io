<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Rehber Motor</title>
    <style>
        body { font-family: 'Times New Roman', serif; max-width: 600px; margin: 40px auto; padding: 30px; background: #fdfbf7; }
        .görev-kutusu { background: #fffaf0; border: 2px solid #8b4513; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>MODULUS X</h1>
    <p><i>"İnsan sadece yer değiştirme ve birleşme yapar; değeri Allah yaratır."</i></p>
    
    <textarea id="durum" style="width:100%; height:120px;" placeholder="Durumunu yaz..."></textarea>
    <button onclick="analizEt()" style="width:100%; padding:15px; background:#231c14; color:#fff;">TEORİK REHBERİ BAŞLAT</button>
    <div id="sonuc" style="margin-top:20px;"></div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
        const generator = await pipeline('text2text-generation', 'Xenova/flan-t5-small');

        window.analizEt = async () => {
            const d = document.getElementById('durum').value;
            // Zekaya "Fiili Görev ve Tashih" talimatı veriyoruz:
            const talimat = `Teori: Zaman*(YerDeğiştirme * Birleşme) = Değer. 
            Durum: ${d}. 
            1. Analiz et, 
            2. Eğer durum negatifse, onu pozitif bir değere çevirmek için 'Tashih' (Düzeltme) yolu göster,
            3. Bugün yapman gereken 1 adet 'Fiili Görev' ver.`;
            
            const sonuc = await generator(talimat);
            document.getElementById('sonuc').innerHTML = `<div class='görev-kutusu'>${sonuc[0].generated_text}</div>`;
        };
    </script>
</body>
</html>
