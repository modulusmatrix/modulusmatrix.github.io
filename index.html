<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulus X - Smart AI Matrix</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0f111a; color: #e2e8f0; margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: 20px auto; background: #1a1c2a; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #00f2fe; text-align: center; font-size: 22px; margin-bottom: 5px; letter-spacing: 1px; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 12px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #38bdf8; font-size: 14px; font-weight: bold; }
        textarea { width: 100%; padding: 12px; background: #0f111a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; font-family: inherit; font-size: 15px; min-height: 100px; resize: vertical; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; border-radius: 6px; color: #0f111a; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 15px; letter-spacing: 0.5px; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; }
        .positive { background: rgba(16, 185, 129, 0.08); border: 1px solid #10b981; }
        .negative { background: rgba(239, 68, 68, 0.08); border: 1px solid #ef4444; }
        
        .chart-container { display: flex; justify-content: center; align-items: center; margin: 20px 0; }
        .progress-circle { position: relative; width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }
        .matrix-report { background: rgba(15, 17, 26, 0.8); padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #334155; }
        .report-title { color: #00f2fe; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        .report-item { font-size: 13px; margin-bottom: 10px; line-height: 1.5; color: #cbd5e1; }
        .report-item strong { color: #f59e0b; }
        
        .tasks-container { background: rgba(15, 17, 26, 0.6); padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid #a78bfa; }
        .tasks-title { color: #a78bfa; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .task-list { padding-left: 15px; margin: 0; }
        .task-item { font-size: 13px; margin-bottom: 8px; line-height: 1.4; list-style-type: square; }
        .source { font-size: 12px; color: #38bdf8; margin-top: 15px; display: block; font-weight: bold; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; line-height: 1.4; }
    </style>
</head>
<body>
<div class="container">
    <h1>MODULUS X MATRIX</h1>
    <div class="subtitle">YAPAY ZEKA DESTEKLİ OTOMATİK FORMÜL ÇÖZÜMLEYİCİ</div>
    
    <div class="form-group">
        <label>Mevcut Durumunuzu, Niyetinizi veya Yaşadığınız Olayı Yazın:</label>
        <textarea id="userText" placeholder="Örn: Kendimi yalnız ve yorgun hissediyorum..."></textarea>
    </div>

    <button onclick="matrisiCalistir()">MATRİSİ OLUŞTUR VE ANALİZ ET</button>
    <div id="result" class="result-box"></div>
</div>

<script>
function matrisiCalistir() {
    var userText = document.getElementById('userText').value.toLowerCase().trim();
    if (!userText) { alert("Lütfen önce bir durum yazın."); return; }

    var S = 2030, Z = 2030;
    var maddi = 5, manevi = 5, dis = 5;
    var xAlani = "İç Dünya / Gönül Alanı";
    var isPositive = true;
    var huzunModu = false;
    var kaynakText = "";
    var metinText = "";
    
    var g1 = "", g2 = "", g3 = "";

    var ilimGrup = ["ilim", "öğren", "ders", "okul", "kitap", "kurs", "kod"];
    var hicretGrup = ["gitmek", "hicret", "taşınmak", "şehir", "yolculuk"];
    var negatifGrup = ["bıktım", "bulaşık", "tembellik", "israf", "hırs", "korkmuyorum", "günah"];
    var huzunGrup = ["zor", "çirkin", "cirkin", "yalnız", "yalniz", "hissediyorum", "üzgün", "uzgun", "yorgun"];

    // Kelime grubu eşleştirmeleri
    for (var i = 0; i < ilimGrup.length; i++) { if (userText.indexOf(ilimGrup[i]) !== -1) { manevi += 4; S = 2100; xAlani = "İlim Meclisi"; } }
    for (var i = 0; i < hicretGrup.length; i++) { if (userText.indexOf(hicretGrup[i]) !== -1) { dis += 3; maddi += 2; xAlani = "Hicret Alanı"; } }
    for (var i = 0; i < huzunGrup.length; i++) { if (userText.indexOf(huzunGrup[i]) !== -1) { huzunModu = true; isPositive = false; manevi += 2; maddi -= 3; Z = 2035; } }
    for (var i = 0; i < negatifGrup.length; i++) { if (userText.indexOf(negatifGrup[i]) !== -1 && !huzunModu) { isPositive = false; manevi -= 3; Z = 2040; } }

    var zamanCarpani = S - Z;
    var hesapZamani = zamanCarpani === 0 ? (isPositive ? 10 : -10) : zamanCarpani;
    
    var yerDegistirme = maddi + manevi + dis;
    var birlesme = (maddi + manevi) * dis;
    var finalEtki = isPositive ? 1 : -1;

    var eylemsellikYuzdesi = 25;
    if (!isPositive) { eylemsellikYuzdesi = 35; } else if (S > 2030) { eylemsellikYuzdesi = 85; }

    if (huzunModu) {
        kaynakText = "İnşirah Suresi 5-6 & Tin Suresi 4";
        metinText = "Şüphesiz güçlükle beraber bir kolaylık vardır. Gerçekten güçlükle beraber bir kolaylık vardır. Biz insanı en güzel biçimde (ahsen-i takvim) yarattık.";
        g1 = "Fiziksel Değişim (Yer Değiştirme): İçinde bulunduğunuz kapalı alanı değiştirmek adına bugün balkona çıkın veya kısa bir yürüyüş yapıp derin nefes alın.";
        g2 = "Manevi Odak (Birleşme): Kendinizi değersiz hissettiren dünyevi ölçüleri reddedin. 'En güzel biçimde yaratıldığınızı' hatırlayarak şükredin.";
        g3 = "Aksiyoner Adım: Yalnızlık hissini kırmak için bu akşam samimi bir dua ile iç dünyanızı ferahlatın veya bir dostunuzla konuşun.";
    } else if (isPositive) {
        kaynakText = "Asr Suresi";
        metinText = "Zamana andolsun ki insan hüsrandadır. Ancak iman edip salih ameller işleyenler müstesna.";
        g1 = "Zaman çarpanınız pozitif. Bu ivmeyi kaybetmemek için bugünün planını hemen yazın.";
        g2 = "Birleşme kaliteniz yüksek. Belirlenen alan yönündeki eyleminizi ertelemeden başlatın.";
        g3 = "Manevi boyutunuzu korumak adına çevrenize küçük bir iyilik yapın.";
    } else {
        kaynakText = "Furkan Suresi";
        metinText = "O gün zalim ellerini ısırarak: Keşke peygamberle birlikte bir yol tutsaydım der.";
        g1 = "Matris çöküş üretiyor. Dünyevi hırslarınızı acilen sorgulayın ve yavaşlayın.";
        g2 = "Yanlış niyet veya alandan uzaklaşmak için kendinize sakin bir tefekkür vakti ayırın.";
        g3 = "Zamanı israf etmeyi durdurun ve kalbinizi karartan alışkanlardan uzak durun.";
    }

    var resultBox = document.getElementById('result');
    resultBox.style.display = 'block';
    
    var grafikRengi = isPositive ? "#10b981" : (huzunModu ? "#f59e0b" : "#ef4444");
    var durumBasligi = isPositive ? "[+] DEĞER KAZANCI / DOĞRU YER DEĞİŞTİRME" : (huzunModu ? "[!] MATRİS UYARISI / İMTİHAN VE HÜZÜN MODU" : "[-] DEĞER KAYBI / YANLIŞ YER DEĞİŞTİRME");
    resultBox.className = isPositive ? "result-box positive" : "result-box negative";
    if (huzunModu) { resultBox.style.borderColor = "#f59e0b"; }

    resultBox.innerHTML = '<strong style="font-size:15px; display:block; text-align:center;">' + durumBasligi + '</strong>' +
        '<div class="chart-container">' +
            '<div class="progress-circle" style="background: conic-gradient(' + grafikRengi + ' ' + (eylemsellikYuzdesi * 3.6) + 'deg, #334155 0deg); color: #fff;">' +
                '<div style="position: absolute; width: 90px; height: 90px; background: #1a1c2a; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;">' +
                    '<span style="font-size:11px; color:#94a3b8;">Eylemsellik</span>' +
                    '<span>%' + eylemsellikYuzdesi + '</span>' +
                '</div>' +
            '</div>' +
        '</div>' +
        '<div class="matrix-report">' +
            '<div class="report-title">📋 MATRİS BİLEŞEN RAPORU</div>' +
            '<div class="report-item">⏱️ <strong>Zaman Çarpanı:</strong> Yapay zeka bu durum için zaman çarpanını ' + hesapZamani + ' olarak simüle etti.</div>' +
            '<div class="report-item">🧬 <strong>Boyut Analizi:</strong> Maddi (' + maddi + '), Manevi (' + manevi + ') ve Dış Boyut (' + dis + ') ile odak alan: "' + xAlani + '" olarak saptandı.</div>' +
            '<div class="report-item">🔄 <strong>Yer Değiştirme Fonksiyonu:</strong> Formül puanı ' + yerDegistirme + '. Konum/Düşünce değişim yapısını düzenlemeniz gerekiyor.</div>' +
            '<div class="report-item">🤝 <strong>Birleşme Fonksiyonu:</strong> Formül puanı ' + birlesme + '. Unsurlarınızın dış dünya ile birleşme düzeyi hesaplandı.</div>' +
        '</div>' +
        '<div class="tasks-container">' +
            '<div class="tasks-title">🎯 YAPAY ZEKA GÖREVLERİ</div>' +
            '<ul class="task-list">' +
                '<li class="task-item">' + g1 + '</li>' +
                '<li class="task-item">' + g2 + '</li>' +
                '<li class="task-item">' + g3 + '</li>' +
            '</ul>' +
        '</div>' +
        '<span class="source">' + kaynakText + ': "' + metinText + '"</span>';
}
</script>
</body>
</html>
