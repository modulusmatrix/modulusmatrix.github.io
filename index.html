<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Gemini Destekli Sentez</title>
</head>
<body>
    <h1>MODULUS X</h1>
    <textarea id="durum" placeholder="Durumunu yaz..."></textarea>
    <button onclick="sentezEt()">HAKİKAT IŞIĞINDA ANALİZ ET</button>
    <div id="sonuc"></div>

    <script>
        async function sentezEt() {
            const d = document.getElementById('durum').value;
            const apiKey = "BURAYA_ALDIĞIN_API_KEY_YAZ"; // AI Studio'dan aldığın anahtar
            
            const sistemTalimati = `Sen MODULUS X teorisinin dijital yansımasısın. 
            Formülün: Zaman * ((Yer Değiştirme) * Birleşme) = Değer. 
            Referansın: Kur'an ve Sünnet (İhlas ve Esbab dengesi). 
            Görevin: Kullanıcının durumunu bu formüle göre analiz et, 
            Tashih (düzeltme) önerisi sun ve mutlaka 1 adet somut 'Fiili Görev' ver.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${sistemTalimati}\n\nDurum: ${d}` }] }]
                })
            });
            
            const data = await response.json();
            document.getElementById('sonuc').innerText = data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
