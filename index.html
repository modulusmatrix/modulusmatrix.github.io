<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Yer Değiştirme ve Birleşme Teorisi</title>
    <style>
        body { background: #faf8f0; font-family: 'Times New Roman', serif; display: flex; justify-content: center; padding: 20px; color: #231c14; }
        .container { background: #fff; padding: 30px; border-radius: 8px; width: 100%; max-width: 650px; border: 1px solid #e3dec3; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; letter-spacing: 3px; border-bottom: 1px solid #e3dec3; padding-bottom: 10px; }
        .essence { font-style: italic; text-align: center; margin: 20px 0; font-size: 1.1rem; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 1px solid #c4bfa3; border-radius: 4px; background: #fffdf5; font-family: inherit; }
        button { width: 100%; padding: 15px; background: #231c14; color: #fff; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
        button:disabled { background: #e3dec3; }
        #result { margin-top: 25px; line-height: 1.7; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>MODULUS X</h2>
    <p class="essence">"İnsan sadece yer değiştirme ve birleşme yapar, değeri yaratan Allah'tır."</p>
    <textarea id="userInput" placeholder="Durumunuzu, niyetinizi ve fiili eyleminizi yazın..."></textarea>
    <button id="btn" onclick="analyze()">TEORİK SENTEZİ BAŞLAT</button>
    <div id="result"></div>
</div>

<script>
    const API_KEY = "AQ.Ab8RN6IogUeEMlDdXN0jOeGCbopevwOPWuM405c5MPrGFTMoDQ"; 

    async function analyze() {
        const text = document.getElementById('userInput').value;
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('btn');
        
        if (!text) return alert("Lütfen durumunuzu girin.");
        
        btn.disabled = true;
        resultDiv.innerText = "Küresel arşivler taranıyor, formül hesaplanıyor...";

        const prompt = `Sen Bayram Gedikli'nin "Yer Değiştirme ve Birleşme Teorisi"ni uygulayan bir algoritmasın.
        Kullanıcının durumu: "${text}"
        
        Bu durumu Bayram Gedikli'nin 4 boyutuyla analiz et:
        1. Zaman Metresi: (İleri mi, geri mi, neden?)
        2. Manevi Boyut: (İhlas ve niyet analizi)
        3. Maddi Boyut: (Esbab ve fiili hareket analizi)
        4. Dış Çevre: (Direnç analizi)
        
        Ayrıca; Kuran-ı Kerim ve Hadis-i Şeriflerden bu duruma en uygun olan ayet ve hadisi seçip paylaş.
        Son olarak; kişinin ekran başında vakit harcamasını engelleyen, hayatın içinde yapması gereken 2 somut, nokta atışı "fiili yer değiştirme ve birleşme" görevi ver.
        Teorinin diline sadık kal, kısa ve vurucu ol.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            resultDiv.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            resultDiv.innerText = "Sistemik hata oluştu. Lütfen bağlantınızı kontrol edin.";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
