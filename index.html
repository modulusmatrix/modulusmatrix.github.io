<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Teorik Rehber</title>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #faf8f5; color: #2d2d2d; line-height: 1.6; padding: 40px; max-width: 700px; margin: auto; }
        .header { text-align: center; border-bottom: 2px solid #8b4513; padding-bottom: 20px; margin-bottom: 30px; }
        .formul-kutusu { background: #fdfbf7; border: 1px solid #dcdcdc; padding: 15px; font-style: italic; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 1px solid #8b4513; background: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #231c14; color: #fff; border: none; cursor: pointer; font-size: 1.1em; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #4a3a2a; }
        #sonuc { margin-top: 30px; padding: 25px; border-left: 4px solid #8b4513; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="header">
        <h1>MODULUS X</h1>
        <p><i>"İnsan sadece yer değiştirme ve birleşme yapar; değeri Allah yaratır."</i></p>
    </div>

    <div class="formul-kutusu">
        <strong>Formül:</strong> Zaman × ((Yer Değiştirme) × Birleşme) = Değer
    </div>

    <textarea id="durum" placeholder="Maddi, manevi ve dış boyutları içeren mevcut durumunu buraya detaylıca yaz..."></textarea>
    <button onclick="sentezEt()">TEORİK ANALİZİ BAŞLAT</button>

    <div id="sonuc">Analiz sonuçları burada belirecektir...</div>

    <script>
        async function sentezEt() {
            const d = document.getElementById('durum').value;
            const sonucDiv = document.getElementById('sonuc');
            const apiKey = "SENİN_API_KEY_BURAYA"; // Anahtarını buraya koy

            sonucDiv.innerHTML = "<i>Teorik süzgeçten geçiliyor, lütfen bekleyin...</i>";
            
            const sistemTalimati = `Sen MODULUS X teorisinin dijital yansımasısın. 
            Formülün: Zaman * (Yer Değiştirme * Birleşme) = Değer. 
            Referansın: Kur'an ve Sünnet (İhlas ve Esbab dengesi). 
            Görevin: Kullanıcının durumunu formüle göre analiz et. 
            Mutlaka 3 başlıkta yanıtla: 
            1. Formülün Durumu (Analiz), 
            2. Tashih (Negatifse nasıl düzelir?), 
            3. Bugünün Fiili Görevi (Somut, uygulanabilir tek bir adım).`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `${sistemTalimati}\n\nDurum: ${d}` }] }] })
                });
                const data = await response.json();
                sonucDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                sonucDiv.innerText = "Sistem şu an meşgul. Lütfen tekrar deneyin.";
            }
        }
    </script>
</body>
</html>
