<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODULUS X | AI Decision Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080b11;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Arka plandaki hafif matrix/devre havası */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(rgba(0, 242, 254, 0.05) 2px, transparent 0),
                radial-gradient(rgba(224, 0, 255, 0.05) 2px, transparent 0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            animation: backgroundMove 60s linear infinite;
            z-index: 1;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, -5%); }
        }

        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        /* Işıklı Logo Alanı */
        .logo-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Logonun arkasındaki parlama efekti */
        .logo-glow {
            position: absolute;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.4) 0%, rgba(224, 0, 255, 0.3) 50%, transparent 100%);
            filter: blur(25px);
            animation: pulseGlow 4s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.1); opacity: 0.9; }
        }

        /* SVG Devre Logosu */
        .circuit-logo {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.6));
        }

        /* Metin Tasarımları */
        .title-brand {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #8ae6ff 0%, #b92eff 50%, #615eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(185, 46, 255, 0.2);
            margin-bottom: 5px;
        }

        .subtitle-brand {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #728aa1;
            opacity: 0.9;
        }

        /* Dekoratif Alt Çizgi */
        .line-decorator {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f2fe, #e000ff, transparent);
            margin: 20px auto 0 auto;
            box-shadow: 0 0 8px #00f2fe;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <svg class="circuit-logo" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 40,40 L 70,70 M 160,40 L 130,70 M 40,160 L 70,130 M 160,160 L 130,130" stroke="#00f2fe" stroke-width="1.5" stroke-dasharray="4 2"/>
                <path d="M 20,100 L 60,100 M 180,100 L 140,100 M 100,20 L 100,60 M 100,180 L 100,140" stroke="#e000ff" stroke-width="1.5"/>
                
                <circle cx="40" cy="40" r="3" fill="#00f2fe"/>
                <circle cx="160" cy="40" r="3" fill="#00f2fe"/>
                <circle cx="40" cy="160" r="3" fill="#00f2fe"/>
                <circle cx="160" cy="160" r="3" fill="#00f2fe"/>
                <circle cx="20" cy="100" r="3" fill="#e000ff"/>
                <circle cx="180" cy="100" r="3" fill="#e000ff"/>

                <path d="M 50,50 L 90,90 L 90,110 L 50,150" stroke="#00f2fe" stroke-width="4" stroke-linecap="round"/>
                <path d="M 150,50 L 110,90 L 110,110 L 150,150" stroke="#00f2fe" stroke-width="4" stroke-linecap="round"/>
                
                <path d="M 65,50 L 95,80 M 135,50 L 105,80 M 65,150 L 95,120 M 135,150 L 105,120" stroke="#e000ff" stroke-width="2"/>

                <circle cx="100" cy="100" r="12" fill="url(#coreGradient)" filter="drop-shadow(0 0 10px #00f2fe)"/>
                
                <defs>
                    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#ffffff"/>
                        <stop offset="40%" stop-color="#00f2fe"/>
                        <stop offset="100%" stop-color="#e000ff" stop-opacity="0"/>
                    </radialGradient>
                </defs>
            </svg>
        </div>

        <h1 class="title-brand">Modulus X</h1>
        <div class="subtitle-brand">AI Decision Matrix</div>
        <div class="line-decorator"></div>
    </div>

</body>
</html>
