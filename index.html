<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Kesin Analiz</title>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #faf8f5; color: #2d2d2d; padding: 40px; max-width: 700px; margin: auto; }
        textarea { width: 100%; height: 120px; border: 1px solid #8b4513; padding: 10px; }
        button { width: 100%; padding: 15px; background: #231c14; color: #fff; border: none; cursor: pointer; }
        #sonuc { margin-top: 20px; padding: 20px; border: 1px solid #8b4513; background: #fff; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>MODULUS X</h1>
    <textarea id="durum" placeholder="Durumunu yaz..."></textarea>
    <button id="analizBtn">HAKİKAT IŞIĞINDA ANALİZ ET</button>
    <div id="sonuc"></div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const btn = document.getElementById('analizBtn');
        btn.onclick = async () => {
            const d = document.getElementById('durum').value;
            const sonucDiv = document.getElementById('sonuc');
            const apiKey = "SENİN_API_KEY_BURAYA"; // Buraya kendi anahtarını yapıştır

            sonucDiv.innerText = "Analiz ediliyor...";

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                const prompt = `Sen MODULUS X teorisinin dijital yansımasısın. 
                Formülün: Zaman * (Yer Değiştirme * Birleşme) = Değer. 
                Referansın: Kur'an ve Sünnet. 
                Durum: ${d}.
                1. Formül analizi, 2. Tashih, 3. Fiili Görev ver.`;

                const result = await model.generateContent(prompt);
                sonucDiv.innerText = result.response.text();
            } catch (error) {
                sonucDiv.innerText = "Hata oluştu: " + error.message;
            }
        };
    </script>
</body>
</html>
