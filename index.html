<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MODULUS X | Dinamik Sentez</title>
    <style>
        body { font-family: serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>MODULUS X: Teorik Sentez</h2>
    <input type="password" id="apiKey" placeholder="Google Gemini API Anahtarınızı Girin (Güvenli)">
    <textarea id="userInput" placeholder="Durumunuzu, niyetinizi ve fiili eyleminizi yazın..."></textarea>
    <button onclick="analyze()">DİNAMİK SENTEZİ BAŞLAT</button>
    <div id="result"></div>

    <script>
        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const text = document.getElementById('userInput').value;
            const res = document.getElementById('result');
            
            // Anahtarı tarayıcı hafızasına alıyoruz, GitHub'a asla gitmiyor!
            res.innerText = "Teori işleniyor...";

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Sen Bayram Gedikli'nin "Yer Değiştirme ve Birleşme Teorisi"ni uygulayan bir yapay zekasın. Kullanıcı durumu: "${text}". Analiz et ve 2 görev ver.` }] }] })
            });
            const data = await response.json();
            res.innerText = data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
